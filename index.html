<style>
/* ════════ MARCA — ajuste as cores aqui se quiser ════════ */
:root{
  --navy:#0A2B4D;
  --navy2:#0d365f;
  --cream:#F6EEE6;
  --cream2:#FFFFFF;
  --ink:#2b2b2b;
  --muted:#7d7264;
  --gold:#e8b86d;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh}

/* ════════ CABEÇALHO ════════ */
.topbar{background:var(--navy);color:#fff;position:relative;overflow:hidden}
.topbar::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:30px;background:var(--cream);clip-path:ellipse(82% 100% at 50% 100%)}
.topbar-inner{max-width:1080px;margin:0 auto;padding:22px 28px 52px;display:flex;justify-content:space-between;align-items:center;gap:16px;position:relative;z-index:2}
.brand{display:flex;align-items:center;gap:12px}
.brand img{width:54px;height:54px;object-fit:contain}
.brand-txt .name{font-family:'Hammersmith One',sans-serif;font-size:22px;letter-spacing:4px;line-height:1}
.brand-txt .sub{font-size:8.5px;letter-spacing:6px;color:rgba(255,255,255,.6);margin-top:3px}
.top-links{display:flex;gap:8px}
.top-links a{display:flex;align-items:center;gap:6px;color:#fff;text-decoration:none;font-size:12px;font-weight:600;background:rgba(255,255,255,.1);padding:8px 14px;border-radius:20px;transition:background .2s}
.top-links a:hover{background:rgba(255,255,255,.22)}

/* ════════ HERO ════════ */
.hero{max-width:1080px;margin:0 auto;padding:34px 28px 6px;text-align:center}
.hero .eyebrow{font-size:11px;font-weight:700;letter-spacing:5px;color:var(--gold);text-transform:uppercase}
.hero h1{font-size:44px;font-weight:900;color:var(--navy);line-height:1.05;margin-top:6px}
.hero .script{display:block;font-family:'Great Vibes',cursive;font-weight:400;font-size:38px;color:var(--muted);line-height:.8;margin-top:4px}
.hero p{max-width:520px;margin:16px auto 0;color:var(--muted);font-size:14px;line-height:1.7}

/* ════════ GRID DE CATÁLOGOS ════════ */
.grid{max-width:1080px;margin:0 auto;padding:34px 28px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:22px}
.card{background:var(--cream2);border-radius:18px;overflow:hidden;border:1px solid rgba(0,0,0,.06);box-shadow:0 8px 30px rgba(10,43,77,.07);display:flex;flex-direction:column;position:relative;text-decoration:none;color:inherit;opacity:0;transform:translateY(16px);animation:rise .5s ease forwards;transition:transform .25s,box-shadow .25s}
.card.live:hover{transform:translateY(-7px);box-shadow:0 22px 48px rgba(10,43,77,.16)}
@keyframes rise{to{opacity:1;transform:none}}
.card .accent{height:7px;background:var(--c,#999)}
.card .cover{height:160px;background-size:cover;background-position:center;background-color:#ece3d8}
.card .body{padding:24px 22px 22px;flex:1;display:flex;flex-direction:column}
.card .emoji{font-size:42px;line-height:1;margin-bottom:12px}
.card h2{font-size:19px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.5px}
.card .desc{font-size:13px;color:var(--muted);line-height:1.65;margin-top:8px;flex:1}
.card .foot{display:flex;align-items:center;gap:8px;margin-top:18px}
.card .go{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:7px;background:var(--c,#999);color:#fff;font-size:12.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:11px 0;border-radius:11px}
.card .copy{width:42px;height:42px;flex-shrink:0;border:1px solid rgba(0,0,0,.12);background:transparent;border-radius:11px;cursor:pointer;font-size:16px;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .2s}
.card .copy:hover{border-color:var(--c);color:var(--c)}
.card.soon{opacity:.62}
.card.soon .accent{background:#c9bfb2}
.card.soon .go{background:#b9ad9e;cursor:default}
.badge-soon{position:absolute;top:14px;right:14px;background:rgba(0,0,0,.06);color:var(--muted);font-size:10px;font-weight:800;letter-spacing:1px;padding:4px 10px;border-radius:20px;text-transform:uppercase}

/* ════════ RODAPÉ ════════ */
.foot-brand{background:var(--navy);color:#fff;text-align:center;padding:30px 24px}
.foot-brand .name{font-family:'Hammersmith One',sans-serif;font-size:18px;letter-spacing:3px}
.foot-brand .sub{font-size:8px;letter-spacing:5px;color:rgba(255,255,255,.4);margin-top:3px}
.foot-brand .tag{font-size:11px;color:rgba(255,255,255,.55);margin-top:12px}

/* ════════ WHATSAPP FLUTUANTE ════════ */
.wa{position:fixed;bottom:24px;right:24px;width:60px;height:60px;border-radius:50%;background:#25d366;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 28px rgba(37,211,102,.4);z-index:50;animation:pulse 2.2s infinite}
.wa svg{width:32px;height:32px;fill:#fff}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(37,211,102,.5)}70%{box-shadow:0 0 0 16px rgba(37,211,102,0)}100%{box-shadow:0 0 0 0 rgba(37,211,102,0)}}

.toast{position:fixed;top:22px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:11px 22px;border-radius:24px;font-size:12px;font-weight:700;z-index:60;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(4px)}

@media (max-width:560px){
  .hero h1{font-size:30px}.hero .script{font-size:32px}
  .brand-txt .name{font-size:18px}
  .top-links a span{display:none}
}
</style>

<script>
/* ══════════════════════════════════════════════════════
   Os dados vêm do bloco "home-data" acima (editado pelo Gerador).
   Se faltar, usa os padrões abaixo como rede de segurança.
   ══════════════════════════════════════════════════════ */
const DEFAULTS = {
  contato: { whatsapp: "5562982416184", instagram: "https://www.instagram.com/calamo3d/" },
  catalogos: [
    { nome: "Mundo Sensorial", desc: "Fidgets, texturas e estímulos impressos em 3D — para foco, calma e diversão.", emoji: "🌀", cor: "#ff4fb8", link: "sensorial/", capa: "", ativo: true }
  ]
};
let HOME = DEFAULTS;
try {
  const _el = document.getElementById('home-data');
  if (_el && _el.textContent.trim()) { const _d = JSON.parse(_el.textContent); if (_d && Array.isArray(_d.catalogos)) HOME = _d; }
} catch (e) { /* mantém DEFAULTS */ }
const CONTATO = HOME.contato || DEFAULTS.contato;
const CATALOGOS = HOME.catalogos || DEFAULTS.catalogos;

/* ══════════════════════════════════════════════════════
   A partir daqui não precisa mexer
   ══════════════════════════════════════════════════════ */
document.getElementById('ig').href = CONTATO.instagram;
document.getElementById('wa-top').href = 'https://wa.me/' + CONTATO.whatsapp;
document.getElementById('wa-float').href = 'https://wa.me/' + CONTATO.whatsapp;

const grid = document.getElementById('grid');

CATALOGOS.forEach((cat, i) => {
  const card = document.createElement(cat.ativo ? 'a' : 'div');
  card.className = 'card ' + (cat.ativo ? 'live' : 'soon');
  card.style.setProperty('--c', cat.cor);
  card.style.animationDelay = (i * 0.08) + 's';
  if (cat.ativo) { card.href = cat.link; }

  const soonBadge = cat.ativo ? '' : '<div class="badge-soon">Em breve</div>';
  const copyBtn = cat.ativo
    ? `<button class="copy" title="Copiar link" aria-label="Copiar link" onclick="copiarLink(event, '${cat.link}')">🔗</button>`
    : '';
  const goTxt = cat.ativo ? 'Ver catálogo →' : 'Em breve';
  const coverHtml = cat.capa ? `<div class="cover" style="background-image:url('${cat.capa}')"></div>` : '';
  const emojiHtml = cat.capa ? '' : `<div class="emoji">${cat.emoji}</div>`;

  card.innerHTML = `
    ${soonBadge}
    <div class="accent"></div>
    ${coverHtml}
    <div class="body">
      ${emojiHtml}
      <h2>${cat.nome}</h2>
      <div class="desc">${cat.desc}</div>
      <div class="foot">
        <span class="go">${goTxt}</span>
        ${copyBtn}
      </div>
    </div>`;
  grid.appendChild(card);
});

function copiarLink(e, path) {
  e.preventDefault();
  e.stopPropagation();
  const url = new URL(path, location.href).href;
  navigator.clipboard.writeText(url).then(() => mostrarToast('🔗 Link copiado!'))
    .catch(() => mostrarToast(url));
}

let toastTimer;
function mostrarToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
